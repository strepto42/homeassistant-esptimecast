send_message:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: esptimecast
    message:
      required: true
      example: "HELLO WORLD"
      selector:
        text:
    speed:
      example: 80
      selector:
        number:
          min: 10
          max: 200
          mode: box
    scrolls:
      example: 3
      selector:
        number:
          min: 0
          max: 100
          mode: box
    seconds:
      example: 15
      selector:
        number:
          min: 0
          max: 3600
          mode: box
    big_numbers:
      selector:
        boolean:
    interrupt:
      selector:
        boolean:

clear_message:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: esptimecast
